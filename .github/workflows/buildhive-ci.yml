name: BuildHive CI Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  buildhive-node:
    name: Node.js Build (via BuildHive)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sample-node-app

    steps:
      - uses: actions/checkout@v4

      - name: BuildHive CI
        id: buildhive
        uses: ./.github/actions/buildhive
        with:
          server-url: ${{ secrets.BUILDHIVE_SERVER_URL || 'http://localhost:3001' }}
          api-key: ${{ secrets.BUILDHIVE_API_KEY || 'test-key' }}
          build-command: 'npm test && npm run build'
          working-directory: sample-node-app
          timeout-minutes: 10
          fallback-timeout-minutes: 1
          artifacts: 'dist/**'
        continue-on-error: true

      - name: Fallback - Run locally if BuildHive unavailable
        if: steps.buildhive.outcome == 'failure' || steps.buildhive.outputs.status == 'FALLBACK'
        run: |
          echo "::notice::BuildHive unavailable — running build locally (fallback)"
          npm install
          npm test
          npm run build

      - name: Report
        if: always()
        run: |
          echo "### BuildHive Report" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.buildhive.outputs.status || 'FALLBACK' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Job ID | ${{ steps.buildhive.outputs.job-id || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Recipe | ${{ steps.buildhive.outputs.recipe-used || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Savings | ${{ steps.buildhive.outputs.cost-savings || '$0.00' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Outcome | ${{ steps.buildhive.outcome }} |" >> $GITHUB_STEP_SUMMARY

  buildhive-python:
    name: Python Build (via BuildHive)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sample-python-app

    steps:
      - uses: actions/checkout@v4

      - name: BuildHive CI
        id: buildhive
        uses: ./.github/actions/buildhive
        with:
          server-url: ${{ secrets.BUILDHIVE_SERVER_URL || 'http://localhost:3001' }}
          api-key: ${{ secrets.BUILDHIVE_API_KEY || 'test-key' }}
          build-command: 'pip install -r requirements.txt && python app.py'
          working-directory: sample-python-app
          timeout-minutes: 10
          fallback-timeout-minutes: 1
        continue-on-error: true

      - name: Fallback - Run locally if BuildHive unavailable
        if: steps.buildhive.outcome == 'failure' || steps.buildhive.outputs.status == 'FALLBACK'
        run: |
          echo "::notice::BuildHive unavailable — running build locally (fallback)"
          pip install -r requirements.txt
          python app.py

  local-only:
    name: Standard CI (no BuildHive - baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Node app
        working-directory: sample-node-app
        run: |
          npm install
          npm test
          npm run build
      - name: Build Python app
        working-directory: sample-python-app
        run: |
          pip install -r requirements.txt
          python app.py
